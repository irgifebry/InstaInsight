<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InstaInsight - Unfollower Analyzer</title>
  <link rel="manifest" href="%BASE_URL%site.webmanifest">
  <link rel="icon" href="https://img.icons8.com/gradient/48/instagram-new.png">
  <meta name="theme-color" content="#090b11">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Space Grotesk', 'system-ui', 'sans-serif']
          },
          colors: {
            neo: {
              bg: '#090b11',
              surface: '#131824',
              elevated: '#1e293b',
              text: '#f8fafc',
              muted: '#94a3b8',
              accent: '#e2e8f0',
            }
          },
          boxShadow: {
            neo: '4px 4px 0 0 #000',
            'neo-lg': '6px 6px 0 0 #000',
            'neo-sm': '3px 3px 0 0 #000',
          }
        }
      }
    }
  </script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background-color: #090b11;
      color: #f8fafc;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::selection {
      background: #e2e8f0;
      color: #090b11;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #090b11;
      border-left: 2px solid #f8fafc;
    }

    ::-webkit-scrollbar-thumb {
      background: #f8fafc;
      border: 2px solid #f8fafc;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .neo-panel {
      background: #131824;
      border: 3px solid #f8fafc;
      box-shadow: 6px 6px 0 #000000;
    }

    .neo-badge {
      background: #1e293b;
      border: 2px solid #f8fafc;
      box-shadow: 2px 2px 0 #000000;
      color: #f8fafc;
    }

    @keyframes slide-in-right {
      from {
        transform: translateX(20px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes fade-in-up {
      from {
        transform: translateY(16px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .animate-fade-in {
      animation: fade-in 0.35s ease-out both;
    }

    .animate-slide-in-right {
      animation: slide-in-right 0.35s ease-out both;
    }

    .animate-fade-in-up {
      animation: fade-in-up 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    input,
    button,
    a {
      touch-action: manipulation;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
