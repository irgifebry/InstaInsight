<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InstaInsight - Unfollower Analyzer</title>
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#833AB4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif']
          },
          colors: {
            instagram: {
              start: '#405DE6',
              middle: '#E1306C',
              end: '#FFDC80'
            },
            slate: {
              950: '#05060b',
              900: '#090b11',
              800: '#131824',
              700: '#20283c',
              600: '#2d3955',
              500: '#405DE6',
              400: '#f1f5f9',
              300: '#f1f5f9',
              200: '#f1f5f9',
              100: '#ffffff',
            },
            purple: {
              400: '#9b4fd1',
              500: '#833AB4',
              600: '#6b2c99',
              700: '#501b78'
            },
            pink: {
              400: '#e8568c',
              500: '#E1306C',
              600: '#bf2055',
              700: '#9c1441'
            },
            indigo: {
              300: '#899bf2',
              500: '#405DE6',
              600: '#2b45c2',
              700: '#1c2f9e'
            },
            orange: {
              400: '#f78f56',
              500: '#F77737',
              600: '#d65618'
            },
            yellow: {
              400: '#ffebaa',
              500: '#FFDC80',
              600: '#e3bd5b'
            }
          }
        }
      }
    }
  </script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background-color: #090b11;
      color: #f1f5f9;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::selection {
      background: rgba(225, 48, 108, 0.35);
      color: #fff;
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(64, 93, 230, 0.4);
      border-radius: 99px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(64, 93, 230, 0.7);
    }

    .instagram-gradient {
      background: linear-gradient(135deg, #405DE6, #5B51D8, #833AB4, #C13584, #E1306C, #FD1D1D, #F56040, #F77737, #FCAF45, #FFDC80);
    }

    .glass-panel {
      background: rgba(19, 24, 36, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    @keyframes slide-in-right {
      from {
        transform: translateX(20px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes fade-in-up {
      from {
        transform: translateY(16px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .animate-fade-in {
      animation: fade-in 0.35s ease-out both;
    }

    .animate-slide-in-right {
      animation: slide-in-right 0.35s ease-out both;
    }

    .animate-fade-in-up {
      animation: fade-in-up 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    input,
    button,
    a {
      touch-action: manipulation;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
